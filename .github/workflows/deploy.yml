name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        timeout-minutes: 15
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/risparmiami

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Updating .env (Resend → SMTP)..."
            if grep -q "RESEND_API_KEY" .env && ! grep -q "SMTP_HOST" .env; then
              sed -i '/RESEND_API_KEY/d' .env
              sed -i 's|EMAIL_FROM=.*|EMAIL_FROM="RisparmiaMi <info@drilonhametaj.it>"|' .env
              echo '' >> .env
              echo 'SMTP_HOST="smtps.aruba.it"' >> .env
              echo 'SMTP_PORT="465"' >> .env
              echo 'SMTP_USER="info@drilonhametaj.it"' >> .env
              echo 'SMTP_PASS="D9W&T#P(}66]!S|u1"' >> .env
              echo "SMTP vars added to .env"
            else
              echo ".env already has SMTP vars or no RESEND_API_KEY found"
            fi

            echo "==> Building containers..."
            docker compose -f docker-compose.prod.yml build app scraper

            echo "==> Starting database services..."
            docker compose -f docker-compose.prod.yml up -d postgres redis meilisearch
            sleep 5

            echo "==> Running database migrations..."
            docker compose -f docker-compose.prod.yml run --rm app node ./node_modules/prisma/build/index.js migrate deploy

            echo "==> Seeding database (idempotent)..."
            docker compose -f docker-compose.prod.yml run --rm app node ./node_modules/tsx/dist/cli.mjs prisma/seed.ts || echo "Seed warning (non-blocking)"

            echo "==> Starting app..."
            docker compose -f docker-compose.prod.yml up -d --no-deps app
            sleep 5

            echo "==> Starting Caddy + scraper..."
            docker compose -f docker-compose.prod.yml up -d caddy scraper

            echo "==> Waiting for health check..."
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T app node -e "fetch('http://localhost:3000/').then(r => console.log('Health:', r.status)).catch(e => console.error('FAIL:', e))"

            echo "==> Generating PDF..."
            docker compose -f docker-compose.prod.yml exec -T app node -e "
              const secret = process.env.CRON_SECRET || '';
              fetch('http://localhost:3000/api/cron/generate-pdf', {headers: {'Authorization': 'Bearer ' + secret}})
                .then(r => r.json()).then(j => console.log('PDF:', JSON.stringify(j))).catch(e => console.error('PDF error:', e))
            " || echo "PDF generation skipped"

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy complete!"
