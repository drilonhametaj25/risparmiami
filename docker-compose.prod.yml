services:
  # ==================== Reverse Proxy (HTTPS) ====================
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
      - backend

  # ==================== Next.js App ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-risparmiami}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-risparmiami}
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_URL=http://meilisearch:7700
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/auth/session').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-risparmiami}
      POSTGRES_USER: ${DB_USER:-risparmiami}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-risparmiami}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ==================== Meilisearch ====================
  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
    volumes:
      - meilidata:/meili_data
    networks:
      - backend

  # ==================== Python Scraper (daemon) ====================
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-risparmiami}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-risparmiami}
      - MEILISEARCH_URL=http://meilisearch:7700
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - backend

volumes:
  pgdata:
  redisdata:
  meilidata:
  caddy_data:
  caddy_config:

networks:
  frontend:
  backend:
